# ── MediSync API Configuration ──────────────────────────────────────────────
server.port=8080

# ── MySQL DataSource ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/medisync?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=140406
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool ───────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.medisync=DEBUG
logging.level.org.springframework.jdbc=DEBUG
